      events: { IT: 'Focus eventi: gruppi, occasioni e stagionalità hanno pagine proprie.', EN: 'Events focus: groups, occasions and seasons get dedicated pages.', DE: 'Event-Fokus: Gruppen und Saison bekommen Seiten.', FR: 'Focus événements: groupes et saisons ont leurs pages.' }
    };

    var controls = {
      demo: Array.prototype.slice.call(root.querySelectorAll('[data-demo-control]')),
      lang: Array.prototype.slice.call(root.querySelectorAll('[data-lang-control]')),
      tone: Array.prototype.slice.call(root.querySelectorAll('[data-tone-control]')),
      focus: Array.prototype.slice.call(root.querySelectorAll('[data-focus-control]')),
      page: Array.prototype.slice.call(root.querySelectorAll('[data-page-control]'))
    };
    var pagesControl = root.querySelector('[data-pages-control]');
    var pagesReadout = root.querySelector('[data-pages-readout]');
    var status = root.querySelector('[data-current-status]');
    var stageNote = root.querySelector('[data-stage-note]');
    var pipelineItems = Array.prototype.slice.call(root.querySelectorAll('[data-pipeline-step]'));
    var preview = root.querySelector('[data-preview-card]');
    var previewUrl = root.querySelector('[data-preview-url]');
    var siteBrand = root.querySelector('[data-site-brand]');
    var siteNav = root.querySelector('[data-site-nav]');
    var siteLang = root.querySelector('[data-site-lang]');
    var sitePage = root.querySelector('[data-site-page]');
    var siteArtifacts = root.querySelector('[data-site-artifacts]');
    var previewLanguageLine = root.querySelector('[data-preview-language-line]');
    var previewPageList = root.querySelector('[data-preview-page-list]');
    var languageCards = root.querySelector('[data-language-cards]');
    var coreTab = root.querySelector('[data-page-core-label]');
    var conversionTab = root.querySelector('[data-page-conversion-label]');

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, function (char) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
      });
    }

    function setPressed(items, value, attr) {
      items.forEach(function (item) {
        var active = item.getAttribute(attr) === value;
        item.classList.toggle('is-active', active);
        item.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    function activeCopy() { return demos[state.demo].copy[state.lang] || demos[state.demo].copy.IT; }

    function paintPipeline() {
      var activeStage = stages[state.stage];
      pipelineItems.forEach(function (item, index) {
        item.classList.toggle('is-active', item.dataset.pipelineStep === activeStage);
        item.classList.toggle('is-complete', index < state.stage);
      });
      if (stageNote) stageNote.textContent = ui.stageNotes[activeStage] || '';
      if (status) status.textContent = ui.stageNotes[activeStage] || ui.ready;
    }

    function renderLanguageCards(demo) {
      if (!languageCards) return;
      languageCards.innerHTML = '';
      ['IT', 'EN', 'DE', 'FR'].forEach(function (code) {
        var copy = demo.copy[code].home;
        var card = document.createElement('article');
        card.className = 'tm-v3-lang-card' + (code === state.lang ? ' is-active' : '');
        card.innerHTML = '<span>' + code + '</span><strong></strong><em></em>';
        card.querySelector('strong').textContent = copy.title;
        card.querySelector('em').textContent = copy.cta + ' - ' + copy.eyebrow;
        languageCards.appendChild(card);
      });
    }

    function renderMiniSite(demo, copySet) {
      var current = copySet[state.page] || copySet.home;
      var home = copySet.home;
      var pages = demo.pages.slice(0, state.pages);
      var labels = demo.tabLabels[state.lang] || demo.tabLabels.IT;
      if (coreTab) coreTab.textContent = labels.core;
      if (conversionTab) conversionTab.textContent = labels.conversion;
      controls.page.forEach(function (button) {
        if (button.dataset.pageControl === 'contact') button.textContent = labels.contact;
      });
      if (siteBrand) siteBrand.textContent = demo.brand;
      if (siteLang) siteLang.textContent = state.lang;
      if (siteNav) siteNav.innerHTML = (demo.nav[state.lang] || demo.nav.IT).map(function (item) { return '<span>' + esc(item) + '</span>'; }).join('');
      if (sitePage) {
        var moduleHtml = current.modules.map(function (item, index) {
          var focus = index === demo.focusIndex[state.focus] ? ' is-focus' : '';
          return '<article class="tm-v3-generated-module' + focus + '"><span>0' + (index + 1) + '</span><strong>' + esc(item[0]) + '</strong><p>' + esc(item[1]) + '</p></article>';
        }).join('');
        var pageLabel = state.page === 'home' ? 'Homepage' : (labels[state.page] || state.page);
        var image = preview ? preview.dataset['image' + demo.imageKey.charAt(0).toUpperCase() + demo.imageKey.slice(1)] : '';
        sitePage.innerHTML = '<div class="tm-v3-generated-page tm-v3-page-' + esc(state.page) + '">' +
          '<section class="tm-v3-generated-hero">' +
            '<div class="tm-v3-generated-copy"><p>' + esc(current.eyebrow) + '</p><h2 data-preview-headline>' + esc(current.title) + '</h2><em>' + esc(toneLines[state.tone][state.lang]) + ' ' + esc(focusLines[state.focus][state.lang]) + '</em><a href="#process" data-preview-cta>' + esc(current.cta) + '</a></div>' +
            '<figure class="tm-v3-generated-visual"><img src="' + esc(image) + '" alt=""><figcaption>' + esc(pageLabel) + '</figcaption></figure>' +
          '</section>' +
          '<p class="tm-v3-generated-body" data-preview-body>' + esc(current.body) + '</p>' +
          '<div class="tm-v3-generated-modules">' + moduleHtml + '</div>' +
          '<div class="tm-v3-generated-depth"><strong>' + esc(ui.metadata) + '</strong><span>' + esc(home.eyebrow) + '</span><span>' + esc(languageNames[state.lang]) + '</span><span>' + esc(state.pages + ' ' + ui.pages) + '</span></div>' +
        '</div>';
      }
      if (siteArtifacts) {
        siteArtifacts.innerHTML = '<strong>' + esc(ui.files) + '</strong>' + demo.files.slice(0, 5).map(function (file) { return '<span>' + esc(file) + '</span>'; }).join('');
      }
      if (previewPageList) previewPageList.textContent = ui.pagePrefix + ': ' + pages.join(' / ');
      if (previewLanguageLine) previewLanguageLine.textContent = ui.selectedLanguage + ': ' + state.lang + ' - ' + current.eyebrow;
      if (pagesReadout) pagesReadout.textContent = state.pages + ' ' + ui.pages;
    }

    function renderPreview() {
      var demo = demos[state.demo];
      var copySet = activeCopy();
      if (preview) {
        preview.style.setProperty('--demo-primary', demo.primary);
        preview.style.setProperty('--demo-accent', demo.accent);
        preview.style.setProperty('--demo-paper', demo.paper);
        preview.dataset.layout = demo.imageKey;
        preview.classList.add('is-refreshing');
        window.setTimeout(function () { preview.classList.remove('is-refreshing'); }, 220);
      }
      if (previewUrl) previewUrl.textContent = demo.url;
      renderMiniSite(demo, copySet);
      renderLanguageCards(demo);
      paintPipeline();
    }

    function bindGroup(items, attr, key) {
      items.forEach(function (item) {
        item.addEventListener('click', function () {
          state[key] = item.getAttribute(attr);
          if (key === 'demo') { state.stage = 1; state.page = 'home'; setPressed(controls.page, state.page, 'data-page-control'); }
          if (key === 'lang') state.stage = 3;
          if (key === 'page') state.stage = 4;
          if (key === 'tone' || key === 'focus') state.stage = 6;
          setPressed(items, state[key], attr);
          renderPreview();
        });
      });
    }

    bindGroup(controls.demo, 'data-demo-control', 'demo');
    bindGroup(controls.lang, 'data-lang-control', 'lang');
    bindGroup(controls.tone, 'data-tone-control', 'tone');
    bindGroup(controls.focus, 'data-focus-control', 'focus');
    bindGroup(controls.page, 'data-page-control', 'page');

    if (pagesControl) {
      pagesControl.addEventListener('input', function () {
        state.pages = Number(pagesControl.value || 7);
        state.stage = 6;
        renderPreview();
      });
    }

    renderPreview();
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      window.setInterval(function () {
        state.stage = (state.stage + 1) % stages.length;
        paintPipeline();
      }, 1800);
    }
  })();
</script>
