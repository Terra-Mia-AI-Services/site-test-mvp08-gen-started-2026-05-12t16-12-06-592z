<style>
  :root {
    --tm-v3-ink: #0e1b24;
    --tm-v3-espresso: #102a32;
    --tm-v3-cream: #f6efe2;
    --tm-v3-paper: #fff9ee;
    --tm-v3-gold: #d79a3d;
    --tm-v3-line: rgba(14, 27, 36, 0.16);
  }

  .tm-corporate-v3 {
    overflow: hidden;
    max-width: 100vw;
    background: var(--tm-v3-cream);
    color: var(--tm-v3-ink);
    font-family: Inter, ui-sans-serif, system-ui, sans-serif;
  }

  .tm-corporate-v3 *, .tm-corporate-v3 *::before, .tm-corporate-v3 *::after { box-sizing: border-box; }
  .tm-corporate-v3 button, .tm-corporate-v3 input { font: inherit; }
  .tm-corporate-v3 button { cursor: pointer; }
  .tm-v3-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }

  .tm-v3-hero {
    position: relative;
    isolation: isolate;
    min-height: calc(100vh - 64px);
    padding: clamp(28px, 4.2vw, 58px) 0 clamp(36px, 5vw, 70px);
    background:
      radial-gradient(circle at 12% 16%, rgba(215, 154, 61, 0.26), transparent 28rem),
      radial-gradient(circle at 86% 24%, rgba(83, 127, 116, 0.34), transparent 30rem),
      linear-gradient(135deg, #07131a 0%, #102a32 48%, #2f554a 100%);
    color: #fff8ec;
  }

  .tm-v3-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -2;
    background:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 52px 52px;
    mask-image: linear-gradient(to bottom, black, transparent 84%);
  }

  .tm-v3-orb { position: absolute; z-index: -1; border-radius: 999px; filter: blur(28px); opacity: 0.55; }
  .tm-v3-orb-a { width: 24rem; height: 24rem; left: -8rem; bottom: 4rem; background: rgba(215, 154, 61, 0.36); }
  .tm-v3-orb-b { width: 22rem; height: 22rem; right: -7rem; top: 6rem; background: rgba(83, 127, 116, 0.44); }

  .tm-v3-hero .tm-v3-shell {
    display: grid;
    grid-template-columns: minmax(0, 0.78fr) minmax(680px, 1.42fr);
    gap: clamp(24px, 3vw, 44px);
    align-items: start;
  }
  .tm-v3-hero-copy, .tm-v3-lab { min-width: 0; max-width: 100%; }

  .tm-v3-kicker {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin: 0;
    color: var(--tm-v3-gold);
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .tm-v3-kicker::before { content: ""; width: 0.72rem; height: 0.72rem; border-radius: 999px; background: currentColor; box-shadow: 0 0 28px currentColor; }
  .tm-v3-kicker-dark { color: #a86435; }

  .tm-v3-hero-copy h1,
  .tm-v3-section-head h2,
  .tm-v3-two-col h2,
  .tm-v3-final h2 {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    letter-spacing: -0.055em;
    line-height: 0.92;
  }

  .tm-v3-hero-copy h1 { max-width: 11.5ch; margin: 1rem 0 0; font-size: clamp(3.7rem, 6.6vw, 6.9rem); }
  .tm-v3-hero-copy h1, .tm-page-hero h1 { overflow-wrap: break-word; }
  .tm-v3-lede { max-width: 40rem; margin: 1.15rem 0 0; color: rgba(255, 248, 236, 0.82); font-size: clamp(1.03rem, 1.5vw, 1.28rem); line-height: 1.72; }
  .tm-v3-cta-row { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 1.65rem; }
  .tm-v3-btn { display: inline-flex; min-height: 3rem; align-items: center; justify-content: center; border-radius: 999px; padding: 0.86rem 1.18rem; border: 1px solid transparent; font-weight: 900; text-decoration: none; transition: transform 180ms ease, background 180ms ease, border-color 180ms ease; }
  .tm-v3-btn:hover { transform: translateY(-1px); }
  .tm-v3-btn-primary { background: var(--tm-v3-gold); color: #101820; }
  .tm-v3-btn-primary:hover { background: #efb563; }
  .tm-v3-btn-secondary { border-color: rgba(255,255,255,0.30); color: #fff8ec; background: rgba(255,255,255,0.08); }
  .tm-v3-btn-secondary:hover { background: rgba(255,255,255,0.14); }

  .tm-v3-assurance { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-top: 1.3rem; color: rgba(255, 248, 236, 0.68); }
  .tm-v3-assurance span { border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; padding: 0.42rem 0.66rem; background: rgba(255,255,255,0.055); font-size: 0.76rem; font-weight: 800; }

  .tm-v3-lab { border: 1px solid rgba(255,255,255,0.22); border-radius: 34px; background: rgba(255, 250, 240, 0.08); box-shadow: 0 28px 90px rgba(0,0,0,0.34); overflow: hidden; backdrop-filter: blur(20px); }
  .tm-v3-lab-topline { display: flex; justify-content: space-between; gap: 1rem; padding: 0.9rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.14); color: rgba(255, 248, 236, 0.74); font-size: 0.72rem; font-weight: 900; letter-spacing: 0.11em; text-transform: uppercase; }
  .tm-v3-lab-topline strong { color: var(--tm-v3-gold); }
  .tm-v3-lab-topline span, .tm-v3-lab-topline strong { min-width: 0; white-space: normal; overflow-wrap: anywhere; }

  .tm-v3-controls { display: grid; grid-template-columns: 1.32fr 0.8fr 1fr 1fr 0.9fr; gap: 0.55rem; padding: 0.72rem; border-bottom: 1px solid rgba(255,255,255,0.14); }
  .tm-v3-control-block { min-width: 0; border: 1px solid rgba(255,255,255,0.13); border-radius: 20px; padding: 0.58rem; background: rgba(7, 19, 26, 0.34); }
  .tm-v3-control-label { display: block; margin-bottom: 0.48rem; color: rgba(255, 248, 236, 0.54); font-size: 0.64rem; font-weight: 900; letter-spacing: 0.13em; text-transform: uppercase; }
  .tm-v3-segment { display: flex; flex-wrap: wrap; gap: 0.38rem; }
  .tm-v3-segment-stack { display: grid; gap: 0.38rem; }

  .tm-v3-segment-btn, .tm-v3-mini-btn { border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.06); color: rgba(255, 248, 236, 0.76); transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease; }
  .tm-v3-segment-btn { display: grid; gap: 0.1rem; width: 100%; min-height: 2.62rem; border-radius: 16px; padding: 0.64rem 0.72rem; text-align: left; }
  .tm-v3-segment-btn strong { font-size: 0.88rem; line-height: 1.05; }
  .tm-v3-segment-btn span { font-size: 0.72rem; opacity: 0.72; line-height: 1.25; }
  .tm-v3-mini-btn { flex: 1 1 auto; min-height: 2.32rem; border-radius: 999px; padding: 0.5rem 0.66rem; font-size: 0.76rem; font-weight: 900; }
  .tm-v3-lang-segment .tm-v3-mini-btn { min-width: 2.6rem; }
  .tm-v3-segment-btn:hover, .tm-v3-mini-btn:hover { transform: translateY(-1px); color: #fff8ec; }
  .tm-v3-segment-btn.is-active, .tm-v3-mini-btn.is-active, .tm-v3-segment-btn[aria-pressed="true"], .tm-v3-mini-btn[aria-pressed="true"] { border-color: rgba(215, 154, 61, 0.86); background: rgba(215, 154, 61, 0.20); color: #fff8ec; box-shadow: inset 0 0 0 1px rgba(215, 154, 61, 0.16); }
  .tm-v3-pages-control { display: grid; align-content: start; gap: 0.3rem; }
  .tm-v3-pages-readout { color: #fff8ec; font-size: 0.92rem; font-weight: 900; }
  .tm-v3-pages-control input { width: 100%; accent-color: var(--tm-v3-gold); }

  .tm-v3-product-grid { display: grid; grid-template-columns: minmax(0, 1fr) 285px; gap: 0.72rem; padding: 0.72rem; }
  .tm-v3-preview-card { --demo-primary: #263228; --demo-accent: #c89d54; --demo-paper: #fff8ea; overflow: hidden; border: 1px solid rgba(255,255,255,0.16); border-radius: 26px; background: var(--demo-paper); color: #20140f; box-shadow: 0 22px 60px rgba(0,0,0,0.24); }
  .tm-v3-browser-bar { display: flex; align-items: center; gap: 0.34rem; padding: 0.72rem 0.82rem; border-bottom: 1px solid rgba(14, 27, 36, 0.12); background: rgba(255,255,255,0.64); color: rgba(14, 27, 36, 0.64); font-size: 0.72rem; font-weight: 900; }
  .tm-v3-browser-bar span { width: 0.56rem; height: 0.56rem; border-radius: 999px; background: rgba(14, 27, 36, 0.24); }
  .tm-v3-browser-bar strong { margin-left: 0.45rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

  .tm-v3-site-tabs {
    display: flex;
    gap: 0.42rem;
    overflow-x: auto;
    padding: 0.62rem 0.78rem;
    border-bottom: 1px solid rgba(14, 27, 36, 0.1);
    background: rgba(255,255,255,0.46);
  }

  .tm-v3-site-tabs button {
    flex: 0 0 auto;
    min-height: 2.2rem;
    border: 1px solid rgba(14, 27, 36, 0.12);
    border-radius: 999px;
    padding: 0.42rem 0.7rem;
    background: rgba(255,255,255,0.62);
    color: rgba(14, 27, 36, 0.68);
    font-size: 0.72rem;
    font-weight: 1000;
    letter-spacing: 0.02em;
  }

  .tm-v3-site-tabs button.is-active,
  .tm-v3-site-tabs button[aria-pressed="true"] {
    border-color: var(--demo-primary);
    background: var(--demo-primary);
    color: #fff9ee;
  }

  .tm-v3-site-preview {
    overflow: hidden;
    border-bottom: 1px solid rgba(14, 27, 36, 0.12);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.64), transparent 52%),
      var(--demo-paper);
  }

  .tm-v3-site-topbar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.9rem;
    align-items: center;
    padding: 0.78rem 1rem;
    border-bottom: 1px solid rgba(14, 27, 36, 0.1);
    color: var(--demo-primary);
  }

  .tm-v3-site-topbar strong {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 1.18rem;
    letter-spacing: -0.03em;
    white-space: nowrap;
  }

  .tm-v3-site-topbar nav {
    display: flex;
    justify-content: center;
    gap: 0.7rem;
    overflow: hidden;
    color: rgba(14, 27, 36, 0.58);
    font-size: 0.68rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.09em;
  }

  .tm-v3-site-topbar nav span { white-space: nowrap; }
  .tm-v3-site-topbar > span {
    border: 1px solid rgba(14, 27, 36, 0.14);
    border-radius: 999px;
    padding: 0.26rem 0.48rem;
    font-size: 0.68rem;
    font-weight: 1000;
  }

  .tm-v3-site-page { padding: 0.88rem; }
  .tm-v3-generated-page { display: grid; gap: 0.78rem; }

  .tm-v3-generated-hero {
    display: grid;
    grid-template-columns: minmax(0, 1.08fr) minmax(180px, 0.92fr);
    gap: 0.82rem;
    align-items: stretch;
  }

  .tm-v3-generated-copy {
    display: grid;
    align-content: center;
    min-height: 218px;
    border-radius: 24px;
    padding: 1.05rem;
    background: linear-gradient(145deg, rgba(255,255,255,0.84), rgba(255,255,255,0.58));
    border: 1px solid rgba(255,255,255,0.62);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.28);
  }

  .tm-v3-generated-copy p {
    margin: 0 0 0.72rem;
    color: var(--demo-primary);
    font-size: 0.68rem;
    font-weight: 1000;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .tm-v3-generated-copy h2 {
    margin: 0;
    max-width: 15ch;
    color: var(--demo-primary);
    font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(1.7rem, 2.4vw, 2.75rem);
    line-height: 0.98;
    letter-spacing: -0.045em;
  }

  .tm-v3-generated-copy em {
    display: block;
    margin-top: 0.8rem;
    color: rgba(14, 27, 36, 0.66);
    font-size: 0.78rem;
    font-style: normal;
    line-height: 1.45;
  }

  .tm-v3-generated-copy a {
    justify-self: start;
    margin-top: 0.95rem;
    border-radius: 999px;
    background: var(--demo-primary);
    color: #fff9ee;
    padding: 0.66rem 0.92rem;
    font-size: 0.82rem;
    font-weight: 1000;
    text-decoration: none;
  }

  .tm-v3-generated-visual {
    position: relative;
    min-height: 218px;
    margin: 0;
    overflow: hidden;
    border-radius: 24px;
    background: var(--demo-primary);
  }

  .tm-v3-generated-visual img {
    width: 100%;
    height: 100%;
    min-height: 218px;
    object-fit: cover;
    display: block;
    filter: saturate(0.96) contrast(1.02);
    transition: transform 420ms ease, opacity 240ms ease;
  }

  .tm-v3-preview-card.is-refreshing .tm-v3-generated-visual img { opacity: 0.72; transform: scale(1.035); }

  .tm-v3-generated-visual figcaption {
    position: absolute;
    left: 0.72rem;
    bottom: 0.72rem;
    border-radius: 999px;
    padding: 0.42rem 0.68rem;
    background: rgba(0,0,0,0.48);
    color: #fff9ee;
    font-size: 0.66rem;
    font-weight: 1000;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .tm-v3-generated-body {
    margin: 0;
    border-left: 4px solid var(--demo-accent);
    padding: 0.72rem 0.86rem;
    border-radius: 0 18px 18px 0;
    background: rgba(255,255,255,0.54);
    color: rgba(14, 27, 36, 0.72);
    font-size: 0.88rem;
    line-height: 1.56;
  }

  .tm-v3-generated-modules {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0.58rem;
  }

  .tm-v3-generated-module {
    min-height: 7.25rem;
    border: 1px solid rgba(14, 27, 36, 0.12);
    border-radius: 20px;
    padding: 0.78rem;
    background: rgba(255,255,255,0.58);
  }

  .tm-v3-generated-module.is-focus {
    border-color: var(--demo-accent);
    background: color-mix(in srgb, var(--demo-accent) 18%, white);
    transform: translateY(-2px);
  }

  .tm-v3-generated-module span {
    display: block;
    color: var(--demo-accent);
    font-size: 0.62rem;
    font-weight: 1000;
    letter-spacing: 0.12em;
  }

  .tm-v3-generated-module strong {
    display: block;
    margin-top: 0.35rem;
    color: var(--demo-primary);
    font-size: 0.94rem;
    line-height: 1.12;
  }

  .tm-v3-generated-module p {
    margin: 0.42rem 0 0;
    color: rgba(14, 27, 36, 0.64);
    font-size: 0.74rem;
    line-height: 1.42;
  }

  .tm-v3-generated-depth,
  .tm-v3-site-artifacts {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }

  .tm-v3-generated-depth strong,
  .tm-v3-site-artifacts strong {
    color: var(--demo-primary);
    font-size: 0.66rem;
    font-weight: 1000;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .tm-v3-generated-depth span,
  .tm-v3-site-artifacts span {
    border: 1px solid rgba(14, 27, 36, 0.12);
    border-radius: 999px;
    padding: 0.32rem 0.52rem;
    background: rgba(255,255,255,0.55);
    color: rgba(14, 27, 36, 0.64);
    font-size: 0.66rem;
    font-weight: 900;
  }

  .tm-v3-site-artifacts {
    padding: 0.72rem 0.9rem;
    border-top: 1px solid rgba(14, 27, 36, 0.1);
    background: rgba(255,255,255,0.42);
  }

  .tm-v3-preview-stage { display: grid; grid-template-columns: 0.92fr 1.08fr; gap: clamp(0.9rem, 2vw, 1.3rem); padding: clamp(1rem, 2vw, 1.35rem); }
  .tm-v3-preview-media { position: relative; min-height: 280px; margin: 0; overflow: hidden; border-radius: 24px; background: var(--demo-primary); }
  .tm-v3-preview-media img { width: 100%; height: 100%; min-height: 280px; object-fit: cover; display: block; filter: saturate(0.92) contrast(1.02); transition: transform 420ms ease, opacity 240ms ease; }
  .tm-v3-preview-card.is-refreshing .tm-v3-preview-media img { opacity: 0.72; transform: scale(1.035); }
  .tm-v3-preview-media figcaption { position: absolute; left: 0.8rem; bottom: 0.8rem; border-radius: 999px; padding: 0.45rem 0.72rem; color: #fff; background: rgba(0,0,0,0.48); font-size: 0.68rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
  .tm-v3-preview-copy { display: flex; flex-direction: column; justify-content: center; min-width: 0; padding: 0.5rem 0; }
  .tm-v3-preview-eyebrow { margin: 0 0 0.7rem; color: var(--demo-primary); font-size: 0.76rem; font-weight: 1000; letter-spacing: 0.13em; text-transform: uppercase; }
  .tm-v3-preview-copy h2 { margin: 0; max-width: 11ch; color: var(--demo-primary); font-family: "Playfair Display", Georgia, serif; font-size: clamp(1.95rem, 3.1vw, 3.45rem); line-height: 0.88; letter-spacing: -0.055em; }
  .tm-v3-preview-copy p[data-preview-body] { margin: 1rem 0 0; max-width: 33rem; color: rgba(14, 27, 36, 0.74); font-size: 0.96rem; line-height: 1.68; }
  .tm-v3-preview-cta { align-self: flex-start; margin-top: 1.2rem; border-radius: 999px; background: var(--demo-primary); color: #fff9ee; padding: 0.78rem 1.05rem; font-weight: 1000; text-decoration: none; box-shadow: 0 14px 28px rgba(0,0,0,0.13); }

  .tm-v3-preview-sections { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.72rem; padding: 0 1.2rem 1.2rem; }
  .tm-v3-preview-section { min-height: 6.7rem; border: 1px solid rgba(14, 27, 36, 0.12); border-radius: 20px; padding: 0.86rem; background: rgba(255,255,255,0.66); transition: border-color 180ms ease, transform 180ms ease, background 180ms ease; }
  .tm-v3-preview-section strong { display: block; color: var(--demo-primary); font-size: 0.95rem; line-height: 1.15; }
  .tm-v3-preview-section span { display: block; margin-top: 0.45rem; color: rgba(14, 27, 36, 0.64); font-size: 0.78rem; line-height: 1.48; }
  .tm-v3-preview-section.is-focus { border-color: var(--demo-accent); background: color-mix(in srgb, var(--demo-accent) 18%, white); transform: translateY(-2px); }
  .tm-v3-preview-footer { display: flex; justify-content: space-between; gap: 1rem; border-top: 1px solid rgba(14, 27, 36, 0.12); padding: 0.85rem 1.2rem; background: rgba(255,255,255,0.56); color: rgba(14, 27, 36, 0.64); font-size: 0.76rem; font-weight: 900; }
  .tm-v3-preview-footer strong { color: var(--demo-primary); text-align: right; }
  .tm-v3-preview-card[data-layout="restaurant"] .tm-v3-generated-hero { grid-template-columns: minmax(180px, 0.9fr) minmax(0, 1.1fr); }
  .tm-v3-preview-card[data-layout="restaurant"] .tm-v3-generated-visual { order: -1; border-radius: 999px 999px 26px 26px; min-height: 260px; }
  .tm-v3-preview-card[data-layout="restaurant"] .tm-v3-generated-copy h2 { max-width: 10ch; }
  .tm-v3-preview-card[data-layout="restaurant"] .tm-v3-generated-module { border-radius: 18px 18px 26px 18px; }
  .tm-v3-preview-card[data-layout="agriturismo"] .tm-v3-generated-hero { grid-template-columns: 1fr; }
  .tm-v3-preview-card[data-layout="agriturismo"] .tm-v3-generated-copy { min-height: 165px; }
  .tm-v3-preview-card[data-layout="agriturismo"] .tm-v3-generated-visual { min-height: 255px; border-radius: 34px; }
  .tm-v3-preview-card[data-layout="agriturismo"] .tm-v3-generated-copy h2 { max-width: 15ch; }
  .tm-v3-preview-card[data-layout="agriturismo"] .tm-v3-generated-modules { grid-template-columns: 1.1fr 0.95fr 0.95fr; }

  .tm-v3-pipeline { border: 1px solid rgba(255,255,255,0.15); border-radius: 26px; padding: 0.92rem; background: rgba(7, 19, 26, 0.36); }
  .tm-v3-pipeline-head { display: grid; gap: 0.34rem; padding-bottom: 0.78rem; border-bottom: 1px solid rgba(255,255,255,0.12); }
  .tm-v3-pipeline-head span { color: rgba(255, 248, 236, 0.56); font-size: 0.68rem; font-weight: 1000; letter-spacing: 0.12em; text-transform: uppercase; }
  .tm-v3-pipeline-head strong { color: #fff8ec; font-size: 0.9rem; line-height: 1.35; }
  .tm-v3-pipeline-list { display: grid; gap: 0.42rem; margin: 0.8rem 0 0; padding: 0; list-style: none; }
  .tm-v3-pipeline-list li { position: relative; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 0.7rem; border: 1px solid rgba(255,255,255,0.13); border-radius: 18px; padding: 0.55rem 0.66rem 0.55rem 2rem; color: rgba(255, 248, 236, 0.64); background: rgba(255,255,255,0.045); }
  .tm-v3-pipeline-list li::before { content: ""; position: absolute; left: 0.78rem; width: 0.62rem; height: 0.62rem; border-radius: 999px; background: rgba(255,255,255,0.22); }
  .tm-v3-pipeline-list span { font-size: 0.82rem; font-weight: 900; line-height: 1.15; }
  .tm-v3-pipeline-list strong { font-size: 0.64rem; font-weight: 1000; letter-spacing: 0.09em; text-transform: uppercase; }
